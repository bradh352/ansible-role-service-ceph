---
- name: Install NFS dependencies
  ansible.builtin.apt:
    pkg:
      - "libcephfs2"
      - "nfs-ganesha"
      - "nfs-ganesha-ceph"
    state: present

- name: "UFW: Allow NFSv4 traffic"
  community.general.ufw:
    rule: allow
    port: 2049
    proto: tcp
    # Only public network is needed

- name: "Make NFS subtrees"
  ansible.builtin.shell: |
    mkdir -p /mnt/cephfs-temp
    mount -t ceph admin@.{{ item.name }}=/ /mnt/cephfs-temp
    mkdir -p /mnt/cephfs-temp/{{ item.nfs_root }}
    chmod 777 /mnt/cephfs-temp/{{ item.nfs_root }}
    umount /mnt/cephfs-temp
    rm -rf /mnt/cephfs-temp
  with_items: "{{ ceph_fs }}"
  when: item.nfs | default(false) and item.nfs_root is defined
  changed_when: false
  run_once: true

- name: "Write Ganesha configuration"
  ansible.builtin.template:
    src: nfs.conf.j2
    dest: "/etc/ganesha/ganesha.conf"
    mode: 660
    owner: root
    group: root
  notify: restart_ganesha

- name: "Ganesha may crash but not auto-restart, we want it to restart."
  block:
    - name: "ensure systemd nfs-ganesha override directory exists"
      ansible.builtin.file:
        path: /etc/systemd/system/nfs-ganesha.service.d
        state: directory
        owner: "root"
        mode: "0755"
    - name: "systemd install nfs-ganesha override"
      ansible.builtin.copy:
        src: nfs-ganesha.override.conf
        dest: /etc/systemd/system/nfs-ganesha.service.d/override.conf
        mode: "0644"
        owner: root
      register: ganesha_override
    - name: "systemd reload"
      when: ganesha_override.changed
      ansible.builtin.command: "systemctl daemon-reload"

- name: "Ensure Ganesha is enabled and started"
  ansible.builtin.service:
    name: nfs-ganesha
    enabled: true
    state: started

- name: "Flush handlers"
  ansible.builtin.meta: flush_handlers

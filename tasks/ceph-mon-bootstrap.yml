---
- name: Check for existing configuration directory
  ansible.builtin.stat:
    path: "/var/lib/ceph/mon/ceph-{{ inventory_hostname | split('.') | first }}"
  register: mon_dir

- name: Check for existing client keyring
  ansible.builtin.stat:
    path: "/etc/ceph/ceph.client.admin.keyring"
  register: ceph_admin_keyring

- name: Fail if configuration exists
  ansible.builtin.fail:
    msg: "Looks like this system is already initialized, if not, delete /var/lib/ceph/mon/ceph-{{ inventory_hostname | split('.') | first }} or /etc/ceph/ceph.client.admin.keyring"
  when: mon_dir.stat.exists or ceph_admin_keyring.stat.exists

- name: Clean up possibly stale files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items:
    - "/tmp/ceph.mon.keyring"
    - "/tmp/monmap"

- name: Create monitor keyring
  ansible.builtin.shell: "ceph-authtool --create-keyring /tmp/ceph.mon.keyring --gen-key -n mon. --cap mon 'allow *'"
- name: Create client keyring
  ansible.builtin.shell: "ceph-authtool --create-keyring /etc/ceph/ceph.client.admin.keyring --gen-key -n client.admin --cap mon 'allow *' --cap osd 'allow *' --cap
    mds 'allow *' --cap mgr 'allow *'"
- name: Generate bootstrap OSD keyring
  ansible.builtin.command: "ceph-authtool --create-keyring /var/lib/ceph/bootstrap-osd/ceph.keyring --gen-key -n client.bootstrap-osd --cap mon 'profile bootstrap-osd'
    --cap mgr 'allow r'"
- name: Merge child keys into monitor keyring
  ansible.builtin.shell: |
    ceph-authtool /tmp/ceph.mon.keyring --import-keyring /etc/ceph/ceph.client.admin.keyring
    ceph-authtool /tmp/ceph.mon.keyring --import-keyring /var/lib/ceph/bootstrap-osd/ceph.keyring
- name: Generate monitor map
  ansible.builtin.command: monmaptool --create --add {{ inventory_hostname | split('.') | first }} {{ ceph_mon_ip }} --fsid {{ ceph_uuid }} /tmp/monmap
- name: Set ownership properly on created files
  ansible.builtin.file:
    path: "{{ item }}"
    owner: ceph
  with_items:
    - "/tmp/ceph.mon.keyring"
    - "/etc/ceph/ceph.client.admin.keyring"
    - "/tmp/monmap"

- name: Create monitor data directory
  ansible.builtin.file:
    path: "/var/lib/ceph/mon/ceph-{{ inventory_hostname | split('.') | first }}"
    owner: ceph
    state: directory

- name: Populate the monitor daemon with the monitor map and keyring
  ansible.builtin.command: ceph-mon --mkfs -i {{ inventory_hostname | split('.') | first }} --monmap /tmp/monmap --keyring /tmp/ceph.mon.keyring
  become_user: ceph

- name: "Ensure ceph-mon is enabled and started"
  ansible.builtin.service:
    name: "ceph-mon@{{ inventory_hostname | split('.') | first }}"
    state: started
    enabled: true

- name: cleanup
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  with_items:
    - "/tmp/monmap"
    - "/tmp/ceph.mon.keyring"
